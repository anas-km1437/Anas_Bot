<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة أنوس</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- القائمة الجانبية للمحادثات -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-heart"></i> ذكرياتنا</h2>
                <button id="new-chat-btn"><i class="fa-solid fa-plus"></i></button>
            </div>
            <ul id="sessions-list"></ul>
        </div>

        <!-- منطقة الدردشة الرئيسية -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="avatar-container">
                    <!-- يمكنك وضع صورة لك هنا في مجلد static باسم avatar.png -->
                    <img src="{{ url_for('static', filename='bot_avatar.png') }}" alt="أنوس" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
                    <div class="online-dot"></div>
                </div>
                <div class="header-info">
                    <h3>أنوس <span>حبيب قلبي</span></h3>
                    <p>متصل الآن</p>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- الرسائل ستظهر هنا -->
            </div>

            <div class="chat-input-container">
                <input type="text" id="user-input" placeholder="اكتبي لـ أنوس هنا يا روحي..." autocomplete="off">
                <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
