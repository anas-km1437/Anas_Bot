<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنوس - شات</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- مكتبة التقاط الشاشة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="dark-mode">
    <div id="hearts-container"></div>
    
    <div class="main-container">
        <header class="chat-header">
            <h1>أنوس 🤖💖</h1>
            <div class="header-buttons">
                <button id="love-dose-btn" class="btn">💊 جرعة حب</button>
                <button id="screenshot-btn" class="btn">📸 حفظ للذكرى</button>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="msg-content">أهلاً بك! أنا أنوس، كيف يمكنني إسعادك اليوم؟ ✨</div>
            </div>
        </main>

        <footer class="input-area">
            <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
            <button id="send-btn">إرسال</button>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
