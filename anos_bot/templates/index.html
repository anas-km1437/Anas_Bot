<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anos Bot | أنوس </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="romantic-background">
        <div class="heart h1">❤️</div>
        <div class="heart h2">💖</div>
        <div class="heart h3">💗</div>
        <div class="heart h4">💓</div>
        <div class="heart h5">💕</div>
        <div class="heart h6">❤️</div>
    </div>

    <div class="app-container">
        
        <aside class="sidebar" id="sidebar">
            <button class="new-chat-btn pulse-button" id="newChatBtn">
                <i class="fa-heart fa-solid"></i> محادثة حب جديدة
            </button>
            <div class="sessions-list" id="sessionsList">
                </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <button class="toggle-sidebar-btn" id="toggleSidebar">
                    <i class="fa-bars fa-solid"></i>
                </button>
                <div class="bot-info">
                    <div class="avatar-wrapper">
                        <img src="{{ url_for('static', filename='bot_avatar.png') }}" alt="Anos Bot" class="bot-avatar-img" onerror="this.src='https://placehold.co/100x100/fbcfe8/6b21a8?text=Anos'">
                        <div class="bot-sparkle"></div>
                    </div>
                    <div>
                        <h2>Anos Bot</h2>
                        <small>بانتظاركِ دائماً</small>
                    </div>
                </div>
                <div class="header-decoration">
                    <i class="fa-spa fa-solid floral-icon"></i>
                </div>
            </header>

            <section class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <span class="welcome-icon glow-heart">❤️</span>
                    <h3>مرحباً بكِ في عالمنا الخاص</h3>
                    <p>ابدئي محادثة جديدة أو اختاري من الأرشيف وسأكون هنا لأجلكِ.</p>
                </div>
            </section>

            <footer class="chat-footer">
                <form class="input-form" id="chatForm">
                    <input type="text" id="userInput" placeholder="اكتبي ما في قلبكِ..." autocomplete="off" required>
                    <button type="submit" id="sendBtn" class="send-button">
                        <i class="fa-heart fa-solid input-heart"></i>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
