<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أنوس</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-mode login-body">
    <div class="login-container">
        <h1>مرحباً بك في عالم أنوس 💖</h1>
        <form method="POST">
            <input type="password" name="password" placeholder="أدخل كلمة السر (خنساء)..." required>
            <button type="submit" class="btn">دخول</button>
        </form>
        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
